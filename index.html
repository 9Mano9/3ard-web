<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عَرض — أحسن العروض بتلبيسة</title>
  <meta name="description" content="اكتشف أحسن العروض بتلبيسة — أكل بيتي، ملابس، إلكترونيات وأكتر">
  <meta property="og:title" content="عَرض — اكتشف العروض بتلبيسة">
  <meta property="og:description" content="تطبيق عَرض — أحسن العروض بتلبيسة. أكل بيتي، ملابس، إلكترونيات وأكتر">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0806; color: #fff; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .logo { color: #c8702a; font-size: 48px; font-weight: 900; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 16px; margin-bottom: 32px; }
    .loading { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #c8702a; color: #fff; padding: 16px 32px;
      border-radius: 16px; text-decoration: none; font-size: 17px; font-weight: 800;
      box-shadow: 0 4px 20px rgba(200,112,42,0.4); transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .features { display: flex; flex-direction: column; gap: 12px; margin: 24px 0; max-width: 300px; }
    .feature { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.6); font-size: 14px; text-align: right; }
    .feature-icon { font-size: 20px; }
  </style>
  <script>
    const path = window.location.pathname;
    const offerMatch = path.match(/\/offer\/(.+)/);
    if (offerMatch) {
      window.location.href = 'ard3://offer/' + offerMatch[1];
      setTimeout(function() {
        document.getElementById('content').style.display = 'flex';
        document.getElementById('loading-msg').style.display = 'none';
      }, 2000);
    }
  </script>
</head>
<body>
  <p id="loading-msg" class="loading">جاري فتح التطبيق...</p>
  <div id="content" style="display: none; flex-direction: column; align-items: center;">
    <div class="logo">عَرض</div>
    <p class="subtitle">اكتشف أحسن العروض بتلبيسة</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.ard3.app">
      📲 حمّل التطبيق
    </a>
    <div class="features">
      <div class="feature"><span class="feature-icon">🔥</span><span>عروض حصرية من أهل تلبيسة</span></div>
      <div class="feature"><span class="feature-icon">📱</span><span>تصفّح بسوايب مثل تيكتوك</span></div>
      <div class="feature"><span class="feature-icon">💬</span><span>تواصل مباشرة مع البائع</span></div>
    </div>
  </div>
  <script>
    if (!window.location.pathname.match(/\/offer\//)) {
      document.getElementById('content').style.display = 'flex';
      document.getElementById('loading-msg').style.display = 'none';
    }
  </script>
</body>
</html>
